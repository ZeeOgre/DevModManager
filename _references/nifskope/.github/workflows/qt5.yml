name: Build NifSkope (Qt 5)

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - develop
    tags-ignore:
      - 'v2*'

jobs:
  build_clang64:
    runs-on: windows-latest
    name: Build MSYS2-CLANG64

    steps:
    - name: 'Checkout'
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive

    - name: 'Setup MSYS2'
      uses: msys2/setup-msys2@v2
      with:
        msystem: CLANG64
        update: true
        cache: true
        install: 'base-devel mingw-w64-clang-x86_64-gcc msys/p7zip mingw-w64-clang-x86_64-qt5-base mingw-w64-clang-x86_64-qt5-imageformats mingw-w64-clang-x86_64-qt5-tools'

    - name: 'Build with qmake'
      shell: msys2 {0}
      run: |
        qmake NifSkope.pro
        make -j 8

    - name: 'Upload Artifacts'
      uses: actions/upload-artifact@v4
      with:
        name: build-clang64
        path: |
          release
