name: CI Publish and Release

on:
  push:
    tags:
      - 'v*'             # create GitHub Release when tags like v1.2.3 are pushed
  workflow_dispatch: {}  # allow manual runs for testing

permissions:
  contents: write

env:
  BUILD_PROJECT: DMM.Standalone.DependencyChecker/DMM.Standalone.DependencyChecker.csproj
  RID: win-x64

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore ${{ env.BUILD_PROJECT }}

      - name: Publish framework-dependent build
        run: |
          dotnet publish ${{ env.BUILD_PROJECT }} -c Release /p:SelfContained=false /p:DebugType=None /p:IncludeSymbols=false /p:SkipNestedPublish=true /p:EnableLocalReleaseTrigger=false -o ./out/dmmdeps
          # Framework-dependent build includes exe + required DLLs (not single file due to project references)
      - name: Publish self-contained single-file (fat) build
        run: |
          dotnet publish ${{ env.BUILD_PROJECT }} -c Release -r ${{ env.RID }} /p:SelfContained=true /p:PublishSingleFile=true /p:PublishTrimmed=true /p:DebugType=None /p:IncludeSymbols=false /p:EnableCompressionInSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true /p:IncludeAllContentForSelfExtract=true /p:SkipNestedPublish=true /p:EnableLocalReleaseTrigger=false -o ./out/dmmdeps-fat
          # Use SkipNestedPublish=true to prevent nested target conflicts during CI publish.

      - name: Normalize names and prepare zips
        shell: pwsh
        run: |
          mkdir out\zips -ErrorAction SilentlyContinue

          # Framework-dependent build - find exe and rename it
          $d1 = Get-ChildItem -Path out\dmmdeps -Filter DMM.Standalone.DependencyChecker.exe -File | Select-Object -First 1
          if ($null -eq $d1) { 
            Write-Error "Framework-dependent DMM.Standalone.DependencyChecker.exe not found in out\dmmdeps"
            Get-ChildItem -Path out\dmmdeps
            exit 1 
          }
          # Rename the exe to dmmdeps.exe
          Rename-Item $d1.FullName -NewName "dmmdeps.exe" -Force

          # Self-contained build - needs renaming from DMM.Standalone.DependencyChecker.exe to dmmdeps-fat.exe
          $d2 = Get-ChildItem -Path out\dmmdeps-fat -Filter DMM.Standalone.DependencyChecker.exe -File | Select-Object -First 1
          if ($null -eq $d2) { 
            Write-Error "Self-contained DMM.Standalone.DependencyChecker.exe not found in out\dmmdeps-fat"
            Get-ChildItem -Path out\dmmdeps-fat
            exit 1 
          }
          Rename-Item $d2.FullName -NewName "dmmdeps-fat.exe" -Force

          # Create zips - include all files for framework-dependent
          Compress-Archive -Path out\dmmdeps\* -DestinationPath out\zips\dmmdeps.zip -Force
          Compress-Archive -Path out\dmmdeps-fat\dmmdeps-fat.exe -DestinationPath out\zips\dmmdeps-fat.zip -Force

          # Verify zips
          Write-Host "Created zips:"
          Get-ChildItem out\zips
      - name: Upload workflow artifacts (optional)
        uses: actions/upload-artifact@v4
        with:
          name: dmmdeps-zips
          path: out/zips

      - name: Ensure GitHub release exists (create if missing, bump tag with retries if already exists)
        id: ensure_release
        uses: actions/github-script@v6
        with:
          script: |
            const tag = context.ref.replace('refs/tags/','');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha;
            const maxAttempts = 3;

            async function createReleaseForTag(t) {
              const releaseBody = `## DevModManager Dependency Checker ${t}

            ### What's New in This Release
            - **Security:** Disabled single-file compression to reduce antivirus false positives (Defender Wacatac heuristic warnings)
            - **Fixed:** Parent archive cache now uses composite primary key to prevent file ownership collisions when the same asset exists in multiple archives (e.g., ContentResources.zip and mod archives)
            - **Improved:** Cache database renamed to \`parentfile_cache.db\` for future multi-game support
            - **Added:** Cache build timing information for performance visibility
            - **Cleaned:** Removed debug logging that was user-specific and wouldn't work for other installations

            ### What It Does
            Scans Starfield plugins (.esm/.esp) and discovers all asset dependencies:
            - Meshes, Materials, Textures (with PC & Xbox paths)
            - Scripts (Papyrus .psc/.pex with automatic import resolution)
            - Terrain (.btd files, overlay masks, and source TIF files)
            - Interface Icons (Inventory/ShipBuilder/Workshop + source TIF files)
            - Voice Assets (PC & Xbox, dev & runtime)
            - Particles, Animations, Morphs, and more

            **Outputs:**
            - \`.achlist\` - JSON array of PC file paths (main asset list for Achievement-safe mod managers)
            - \`.achlist_warn\` - Files found in parent game archives (may need manual review)
            - \`.achlist_discard\` - High-probability false positives from NIF decoding (usually non-existent paths)
            - \`_deps.csv\` - Detailed spreadsheet with file paths, asset types, and discovery sources
            - \`_deps.json\` - Full dependency manifest (JSON format, omitted with --silent)

            ### Downloads
            - **dmmdeps.zip** (~4 MB compressed, includes required dependencies) - Framework-dependent build. Requires [.NET 9 Runtime](https://dotnet.microsoft.com/download/dotnet/9.0/runtime)
            - **dmmdeps-fat.zip** (~18 MB) - Self-contained single-file build. Includes .NET 9 runtime, no dependencies required. Uncompressed to reduce antivirus false positives.

            ### Basic Usage
            \`\`\`
            dmmdeps.exe "C:\\Path\\To\\YourMod.esm"
            \`\`\`
            Creates \`YourMod.achlist\`, \`YourMod.achlist_warn\`, \`YourMod.achlist_discard\`, \`YourMod_deps.csv\`, and \`YourMod_deps.json\` in the same folder.

            ### Understanding the Output Files

            **Main Files:**
            - **\`.achlist\`** - Your primary asset list. These are verified files that exist on disk and should be included in your mod package.

            **Review Files:**
            - **\`.achlist_warn\`** - Files found in parent game archives (e.g., Starfield.esm's BA2 files). These may be legitimate dependencies or false positives from the NIF decoder. Review these to decide if they should be included in your mod.
            - **\`.achlist_discard\`** - High-probability false positives from NIF decoding. These are typically non-existent artifact paths that can be safely ignored.

            **Detailed Manifests:**
            - **\`_deps.csv\`** - Spreadsheet with all discovered dependencies, including PC/Xbox paths, asset types, and discovery sources.
            - **\`_deps.json\`** - Full JSON manifest with metadata (omitted when using --silent).

            ### Command-Line Options
            \`\`\`
            dmmdeps.exe <pluginPath> [options]

            Options:
              --gameroot <path>     Override game root (parent of Data folder)
              --xboxdata <path>     Override Xbox Data root (default from CreationKit.ini)
              --ps5data <path>      Override PS5 Data root (default <GameRoot>\\PS5\\Data)
              --tifroot <path>      Override TIF source root (default ..\\..\\Source\\TGATextures)
              --scriptsroot <path>  Override Scripts folder (default Data\\Scripts)
              --test                Write .achlist.test instead of .achlist
              --quiet               Suppress skipped-file messages
              --silent              Suppress all output except start/completion
              --verbose             Emit detailed diagnostics for ignored/missing files
              --smartclobber        Seed candidates from existing .achlist (captures manual overrides like Data\\Interface\\mapicons.swf)
              --rebuildcache        Force rebuild of parent archive cache (rarely needed; auto-detects changes by default)
              --include-psc         Include .psc script source files in achlist (for distributing source code)
            \`\`\`

            ### Examples
            **Auto-detect everything:**
            \`\`\`
            dmmdeps.exe "C:\\Games\\Starfield\\Data\\MyMod.esm"
            \`\`\`

            **Custom development setup:**
            \`\`\`
            dmmdeps.exe "G:\\ModDev\\MyMod.esm" --gameroot "C:\\Games\\Starfield" --tifroot "G:\\Source\\TGATextures"
            \`\`\`

            **Include script source files for open-source distribution:**
            \`\`\`
            dmmdeps.exe MyMod.esm --include-psc
            \`\`\`

            **CI/CD pipeline (silent mode):**
            \`\`\`
            dmmdeps.exe MyMod.esm --silent
            \`\`\`

            **Note:** The tool automatically detects changes to parent game archives (.ba2 files) and rebuilds its cache when needed. The \`--rebuildcache\` option is available for troubleshooting but should rarely be necessary.

            ### Performance
            **First run (building cache):** ~44 seconds for a typical Starfield mod with base game + DLC archives  
            **Subsequent runs (cached):** ~3 seconds for ~5000 files  
            **Cache size:** ~550 MB (base game + Creation Kit ContentResources), ~650 MB with expansions and common master dependencies

            The cache is stored at \`%LOCALAPPDATA%\\ZeeOgre\\dmmdeps\\parentfile_cache.db\` and uses a composite-key SQLite schema to preserve duplicate file paths across multiple archives without collision.

            No directory walking required - deterministic asset discovery based on plugin content.

            ### Full Documentation
            See [README.md](https://github.com/ZeeOgre/DevModManager/blob/master/DMM.Standalone.DependencyChecker/README.md) for detailed documentation, troubleshooting, and integration guide.

            ### Complementary PowerShell Script
            While the rest of DMM is under development in C#, a complementary PowerShell script is available to automate mod backups and archive management for producing Windows and Xbox \`.ba2\` archives:

            - [StarfieldArchiveManager.ps1](https://github.com/ZeeOgre/SharedResources/blob/master/scripts/StarfieldArchiveManager.ps1)
            `;

              const { data: newRel } = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: t,
                name: `dmmdeps ${t}`,
                body: releaseBody,
                draft: false,
                prerelease: false
              });
              core.info(`Created release id=${newRel.id} for ${t}`);
              return { upload_url: newRel.upload_url, id: newRel.id, tag: t };
            }

            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              core.info(`Release for ${tag} already exists (id=${release.id}). Will attempt to bump tag and create a new release.`);

              const m = tag.match(/^v?(\d+)\.(\d+)\.(\d+)$/);
              if (!m) throw new Error(`Cannot parse tag '${tag}' as MAJOR.MINOR.PATCH`);
              const major = parseInt(m[1],10), minor = parseInt(m[2],10), basePatch = parseInt(m[3],10);

              for (let attempt = 1; attempt <= maxAttempts; attempt++) {
                const newPatch = basePatch + attempt;
                const newTag = `v${major}.${minor}.${newPatch}`;
                core.info(`Attempt ${attempt}/${maxAttempts}: creating tag ref ${newTag} -> ${sha}`);
                try {
                  await github.rest.git.createRef({ owner, repo, ref: `refs/tags/${newTag}`, sha });
                  core.info(`Created ref refs/tags/${newTag}`);
                  return await createReleaseForTag(newTag);
                } catch (err) {
                  core.warning(`Attempt ${attempt} failed: ${err.message}`);
                  if (err.status === 422 || (err.message && err.message.includes('already exists'))) {
                    core.info(`Tag ${newTag} already exists, will try next patch.`);
                  } else {
                    throw err;
                  }
                }
              }

              throw new Error(`Failed to create bumped tag after ${maxAttempts} attempts.`);
            } catch (err) {
              if (err.status === 404) {
                core.info(`No existing release for ${tag}. Creating new release.`);
                return await createReleaseForTag(tag);
              }
              throw err;
            }

      - name: Upload dmmdeps.zip to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ fromJson(steps.ensure_release.outputs.result).upload_url }}
          asset_path: out/zips/dmmdeps.zip
          asset_name: dmmdeps.zip
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload dmmdeps-fat.zip to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ fromJson(steps.ensure_release.outputs.result).upload_url }}
          asset_path: out/zips/dmmdeps-fat.zip
          asset_name: dmmdeps-fat.zip
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Inspect slim output (files + sizes)
        shell: pwsh
        run: |
          Write-Host "Dotnet version:"
          dotnet --version
          Write-Host ""

          Write-Host "Slim publish folder contents:"
          Get-ChildItem -Path out\dmmdeps -Force | Select-Object Name, Length | Format-Table -AutoSize

          $sum = (Get-ChildItem -Path out\dmmdeps -Force | Measure-Object -Property Length -Sum).Sum
          Write-Host ""
          Write-Host "Slim folder total bytes: $sum"